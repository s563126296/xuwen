<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 32 32">
  <!-- 船体 -->
  <path d="M16 4 L22 12 L24 20 L22 24 L10 24 L8 20 L10 12 Z" fill="#1a3a5c" stroke="#4da6ff" stroke-width="0.6" opacity="0.95"/>
  <!-- 甲板 -->
  <rect x="11" y="12" width="10" height="8" rx="1" fill="#1e4a6e" stroke="#4da6ff" stroke-width="0.4" opacity="0.9"/>
  <!-- 驾驶舱 -->
  <rect x="13" y="8" width="6" height="5" rx="0.8" fill="#2a5a80" stroke="#4da6ff" stroke-width="0.5"/>
  <rect x="14" y="9" width="4" height="3" rx="0.4" fill="#0d2137" stroke="#4da6ff" stroke-width="0.3" opacity="0.8"/>
  <!-- 烟囱 -->
  <rect x="15" y="5.5" width="2" height="3" rx="0.3" fill="#f87171" opacity="0.9"/>
  <!-- 车辆甲板标记 -->
  <line x1="12" y1="15" x2="20" y2="15" stroke="#4da6ff" stroke-width="0.3" opacity="0.4"/>
  <line x1="12" y1="17" x2="20" y2="17" stroke="#4da6ff" stroke-width="0.3" opacity="0.4"/>
  <line x1="12" y1="19" x2="20" y2="19" stroke="#4da6ff" stroke-width="0.3" opacity="0.4"/>
  <!-- 船首灯 -->
  <circle cx="16" cy="5" r="0.8" fill="#34d399" opacity="0.8"/>
  <!-- 航行灯（左红右绿） -->
  <circle cx="9" cy="16" r="0.6" fill="#f87171" opacity="0.7"/>
  <circle cx="23" cy="16" r="0.6" fill="#34d399" opacity="0.7"/>
</svg>
